name: credit_tracker_lite
description: A fully offline Credit Tracker app built with Flutter and Hive.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^0.68.0
  intl: ^0.19.0
  provider: ^6.1.2
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  path_provider: ^2.1.4
  crypto: ^3.0.3
  file_picker: ^8.0.0
  share_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/preview-Photoroom.png
